<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Menu</title>

<style>
    body {
        font-family: cursive;
        background: #f4f4f4;
        margin: 0;
    }

    header {
        text-align: center;
        background: #ff5722;
        color: white;
        padding: 20px;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
    }

    .card {
        background: white;
        width: 250px;
        margin: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        overflow: hidden;
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 50%;
        object-fit: ;
    }

    .card-body {
        padding: 15px;
        text-align: center;
    }

    .card-body h3 {
        margin: 10px 0;
    }

    .price {
        color: #e64a19;
        font-weight: bold;
        font-size: 18px;
    }

    .btn {
        margin-top: 10px;
        padding: 8px 15px;
        border: none;
        background: #ff5722;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn:hover {
        background: #e64a19;
    }
</style>
</head>

<body>

<header>
    <h1>Meals</h1>
</header>

<div class="container">

    <div class="card">
        <img src="HCDB.jpg" alt="Burger">
        <div class="card-body">
            <h3>Chicken Biriyani</h3>
            <p class="price">₹180</p>
            <button class="btn">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="Mutton Mandi Recipe by SooperChef (Bakra Eid Special).jpg" alt="Mandhi">
        <div class="card-body">
            <h3>Mandhi</h3>
            <p class="price">₹500</p>
            <button class="btn">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="Schezwan fried rice recipe, how to make schezwan fried rice.jpg" alt="Fries">
        <div class="card-body">
            <h3>Fired Rice</h3>
            <p class="price">₹120</p>
            <button class="btn">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="meal.jpg" alt="meal">
        <div class="card-body">
            <h3>Meal</h3>
            <p class="price">₹100</p>
            <button class="btn">Order Now</button>
        </div>
    </div>

</div>

</body>
</html>
